name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write    # to publish a Release
  packages: write    # to push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rednotebook-ai

jobs:
  # ----------------------------------------------------------------------
  # 1. Create the GitHub Release shell up front so every build job can
  #    attach assets directly to it (avoids the flaky cross-job
  #    download-artifact dance that bit us on v0.1.0/v0.1.1).
  # ----------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Install

            **Docker (any OS):**
            ```bash
            docker run -p 8000:8000 ghcr.io/${{ github.repository_owner }}/rednotebook-ai:${{ github.ref_name }}
            ```

            **Python (any OS):** download the attached `*.whl` and `pip install` it.

            See the [README](https://github.com/${{ github.repository_owner }}/RedNotebookAI#install) for full instructions.

  # ----------------------------------------------------------------------
  # Docker image to GHCR (multi-arch)
  # ----------------------------------------------------------------------
  docker:
    name: Docker image (ghcr.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------------------
  # Python sdist + wheel (attached directly to the Release)
  # ----------------------------------------------------------------------
  python-dists:
    name: Python sdist + wheel
    needs: [create-release]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true

  # Desktop binaries (PyInstaller DMG/EXE/tarball) used to live here but
  # were dropped in v0.2.0: they shipped as ~100 MB single-window-browser
  # wrappers that added zero value over `docker run` or `pip install`.
  # If a real native shell (Tauri / Electron) lands later, reintroduce
  # the matrix at that point.
